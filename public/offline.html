<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <title>Breakup OS Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #09090b;
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(90vw, 420px);
        text-align: center;
      }
      .badge {
        display: inline-flex;
        border: 1px solid rgba(236, 72, 153, 0.35);
        background: rgba(236, 72, 153, 0.12);
        color: #fbcfe8;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 12px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 32px;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Offline</div>
      <h1>Breakup OS needs a signal.</h1>
      <p>Your private data and AI tools need a connection. Come back online and refresh.</p>
    </main>
  </body>
</html>
